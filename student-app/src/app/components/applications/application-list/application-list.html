<div class="applications-container">
  <h1>Moje prijave</h1>

  <div class="spinner-container" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && applications.length === 0" class="empty-state">
    <mat-icon>assignment</mat-icon>
    <p>Nemate prijava na prakse.</p>
    <button mat-raised-button color="primary" routerLink="/dashboard/internships">
      Pregledaj prakse
    </button>
  </div>

  <div class="apps-grid" *ngIf="!loading && applications.length > 0">
    <mat-card class="app-card" *ngFor="let app of applications">
      <mat-card-header>
        <mat-icon mat-card-avatar [style.color]="getStatusColor(app.status)">
          {{ getStatusIcon(app.status) }}
        </mat-icon>
        <mat-card-title>{{ app.internship?.title }}</mat-card-title>
        <mat-card-subtitle>{{ app.internship?.company?.name }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="status-badge" [style.background]="getStatusColor(app.status)">
          {{ getStatusLabel(app.status) }}
        </div>

        <div class="app-info">
          <span><mat-icon>calendar_today</mat-icon> Prijavljeno: {{ app.appliedAt | date:'dd.MM.yyyy' }}</span>
        </div>

        <mat-chip-set *ngIf="app.internship?.technologies?.length > 0">
          <mat-chip *ngFor="let tech of app.internship.technologies">{{ tech.name }}</mat-chip>
        </mat-chip-set>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button color="primary"
                [routerLink]="['/dashboard/internships', app.internship?.id]">
          <mat-icon>visibility</mat-icon>
          Pogledaj praksu
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
