<div class="internship-container">
  <h1>Dostupne prakse</h1>

  <div class="filters">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Pretraži po nazivu</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()"
             placeholder="npr. Java, Angular...">
      <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="tech-filter">
      <mat-label>Filtriraj po tehnologiji</mat-label>
      <mat-select [(ngModel)]="selectedTechId" (selectionChange)="onTechFilter()">
        <mat-option [value]="null">Sve tehnologije</mat-option>
        <mat-option *ngFor="let tech of technologies" [value]="tech.id">
          {{ tech.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-stroked-button (click)="clearFilters()">
      <mat-icon>clear</mat-icon>
      Resetuj filtere
    </button>

    <button mat-raised-button color="primary" (click)="onSearch()">
      <mat-icon>search</mat-icon>
      Pretraži
    </button>
  </div>

  <div class="spinner-container" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading">
    <table mat-table [dataSource]="internships" class="internship-table">

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Naziv prakse</th>
        <td mat-cell *matCellDef="let i">{{ i.title }}</td>
      </ng-container>

      <ng-container matColumnDef="company">
        <th mat-header-cell *matHeaderCellDef>Kompanija</th>
        <td mat-cell *matCellDef="let i">{{ i.company.name }}</td>
      </ng-container>

      <ng-container matColumnDef="technologies">
        <th mat-header-cell *matHeaderCellDef>Tehnologije</th>
        <td mat-cell *matCellDef="let i">
          <mat-chip-set>
            <mat-chip *ngFor="let tech of i.technologies">{{ tech.name }}</mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef>Početak</th>
        <td mat-cell *matCellDef="let i">{{ i.startDate | date:'dd.MM.yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef>Kraj</th>
        <td mat-cell *matCellDef="let i">{{ i.endDate | date:'dd.MM.yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Detalji</th>
        <td mat-cell *matCellDef="let i">
          <button mat-icon-button color="primary"
                  [routerLink]="['/dashboard/internships', i.id]">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          class="table-row"></tr>
    </table>

    <mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageIndex]="pageIndex"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)"
  showFirstLastButtons>
</mat-paginator>
  </div>
</div>
